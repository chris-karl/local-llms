# Single source of truth for every model in this repo.
#
#   ./chat.sh <name>    interactive CLI chat, no server   (llama-cli)
#   ./serve.sh          router server for Claude Code     (llama-server)
#
# Section name = the model id: what you type after ./chat.sh, and what the
# router answers to (Claude Code's /model shows it as "claude-<name>").
#
# Keys must be real llama.cpp long-form flags, shared by both binaries -- see
# the README's Notes for the naming rules and the two special keys
# (wired-limit-mb, chat-template-file). Presets are sized for a ~13.5 GB
# GPU-wired budget; quant, ctx-size and wired-limit-mb are the knobs for a
# different one.

# Qwen3.6-35B-A3B -- the default for Claude Code. A MoE with 3B active params,
# so it decodes several times faster than the dense 27B (what an agentic loop
# spends most of its time on) and scores just below it (SWE-bench Verified
# 73.4 vs 77.2). ~11.4 GiB wired: ~10.7 GiB UD-IQ2_M weights + only ~0.5 GiB
# q8_0 KV at 48K, since most layers carry recurrent state, not a growing KV
# cache. parallel = 1 because that state is per-slot. Needs the cap raised.
[qwen-35b]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ2_M
chat-template-file = templates/qwen3.6.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Qwen3.6-27B -- dense, every param active per token: the strongest model
# here (SWE-bench Verified 77.2, Terminal-Bench 2.0 59.3) and the slowest
# (~5x the 35B's latency), for the tasks the 35B gets wrong. ~12.0 GiB wired
# at 48K: ~10.1 GiB weights + ~1.6 GiB q8_0 KV, which grows fast with context
# -- 48K is the ceiling, 64K overflows even the raised cap.
[qwen-27b]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3.6-27B-GGUF:UD-IQ2_M
chat-template-file = templates/qwen3.6.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Qwen3-Coder-30B-A3B -- Claude Code candidate, staged for testing. The
# coder-tuned sibling of qwen-35b (30B MoE, 3B active), for a coder-vs-general
# A/B at the same 2-bit tier and speed class. ~10.1 GiB UD-IQ2_M weights, but
# full-attention KV grows with context like the dense 27B: 32K fits with room,
# 48K is the stretch to confirm. Its built-in template handles Claude Code's
# trailing system message and tool calls, so no chat-template-file is pinned.
[qwen3-coder]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:UD-IQ2_M
no-mmproj = true
n-gpu-layers = 999
ctx-size = 32768
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# gpt-oss-20b -- Claude Code candidate, staged for testing. OpenAI's open 21B
# MoE, 3.6B active, native function calling. The one candidate that escapes the
# 2-bit squeeze: its experts are natively MXFP4, so Q5_K_M is near-native at
# ~10.9 GiB. Sliding-window attention keeps the KV small, so 48K fits easily
# (64K+ likely). Its built-in harmony template needs no chat-template-file, but
# its tool format grammar-constrains arguments: Claude Code's full tool suite
# overflows llama.cpp's grammar limit, so it needs router-shim.sh, which
# serve.sh runs in front of llama-server (see the README).
[gpt-oss]
wired-limit-mb = 13824
hf-repo = unsloth/gpt-oss-20b-GGUF:Q5_K_M
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Devstral-Small-2507 -- Claude Code candidate, staged for testing. Mistral's
# dense 24B, purpose-built for agentic coding tool-use. The test: at 24B it fits
# ~3-bit (IQ3_XS, ~9.2 GiB) where the MoEs above need 2-bit -- does a smaller,
# higher-precision model beat a 2-bit giant? Dense, so it is the slowest and its
# KV is heavy: q8_0 KV OOMs past ~36K, so it runs 48K at q5_1 KV (near-lossless)
# to clear Claude Code's ~29K system prompt. bartowski's GGUF ships a minimal
# template with no tool syntax, so it gets Unsloth's tool-enabled one
# (chat-template-file below).
# Like gpt-oss its tool format grammar-constrains arguments, so it too needs
# router-shim.sh in front of llama-server (serve.sh runs it; see the README).
[devstral]
wired-limit-mb = 13824
hf-repo = bartowski/mistralai_Devstral-Small-2507-GGUF:IQ3_XS
chat-template-file = templates/devstral.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q5_1
cache-type-v = q5_1

# Image-enabled uncensored 27B finetune, for ./chat.sh: ~11 GB weights +
# 0.9 GB f16 vision tower + ~1.1 GB worst-case image-encode buffers. Needs
# no-mmap on top of the raised cap, or auto-fit can't keep vision's weights in
# CPU RAM. image-max-tokens caps per-image encode cost (lower to 512 for faster
# turns). Its 8K context is too small for Claude Code (see the README's Limits).
[qwen-27b-uncensored]
wired-limit-mb = 13824
hf-repo = HauhauCS/Qwen3.6-27B-Uncensored-HauhauCS-Aggressive:IQ3_XS
chat-template-file = templates/qwen3.6.jinja
no-mmap = true
n-gpu-layers = 999
ctx-size = 8192
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
image-max-tokens = 1024
