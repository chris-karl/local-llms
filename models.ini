# Single source of truth for every model in this repo.
#
#   ./chat.sh <name>    interactive CLI chat, no server   (llama-cli)
#   ./serve.sh          router server for Claude Code     (llama-server)
#
# Section name = the model id: what you type after ./chat.sh, and what the
# router answers to. Claude Code's /model picker shows it as "claude-<name>".
#
# Keys must be real llama.cpp long-form flag names -- the router refuses to
# start on an unknown key -- and both llama-cli and llama-server accept every
# key below, which is why one file drives both. Note "n-gpu-layers", not
# "ngl": llama-cli only takes -ngl in its short form. Two keys are special,
# both explained in the README: "wired-limit-mb" is ours rather than
# llama.cpp's and is stripped before launch, and "chat-template-file" is a
# real flag whose relative value resolves against this directory.
#
# These presets are sized to fit a GPU-wired budget of ~13.5 GB. Quant,
# ctx-size and wired-limit-mb are the knobs to turn for a different budget.

# Qwen3.6-35B-A3B -- the default for Claude Code. A MoE with 3B active
# parameters, so it decodes several times faster than a dense 27B, and an
# agentic loop is mostly decoding; on agentic benchmarks it sits just below
# the dense 27B (SWE-bench Verified 73.4 vs 77.2). ~11.1 GiB of UD-IQ2_M
# weights: Unsloth's dynamic 2-bit, which keeps the layers that matter at
# higher bits. Hybrid attention (10/40 full-attn layers) makes 64K context
# cheap with q8_0 KV. The GGUF carries Qwen's multi-token-prediction head;
# spec-type = draft-mtp uses it for self-speculative decoding (needs
# llama.cpp with draft-mtp, b10050 has it). no-mmproj skips the 0.9 GB
# vision projector the repo also ships.
[qwen-35b]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-IQ2_M
chat-template-file = templates/qwen3.6.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 65536
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
spec-type = draft-mtp
spec-draft-n-max = 2

# Qwen3.6-27B -- all parameters active on every token: the strongest model
# here per token (SWE-bench Verified 77.2, Terminal-Bench 2.0 59.3) and the
# slowest, for the Claude Code tasks the 35B gets wrong. ~10.3 GiB of
# UD-IQ2_M weights; same hybrid attention family, so 64K context still
# fits the wired budget. Same MTP head and draft-mtp speedup as above.
[qwen-27b-64k]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3.6-27B-MTP-GGUF:UD-IQ2_M
chat-template-file = templates/qwen3.6.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 65536
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
spec-type = draft-mtp
spec-draft-n-max = 2

# Image-enabled uncensored 27B finetune, for ./chat.sh: ~11 GB weights +
# 0.9 GB f16 vision tower + ~1.1 GB worst-case image-encode buffers. Needs
# no-mmap on top of the raised cap -- with mmap the whole file is
# Metal-mapped as one buffer and auto-fit can't keep the ~0.5 GB of weights
# in CPU RAM that vision needs room for. image-max-tokens caps per-image
# encode cost; lower to 512 for faster image turns at less detail. 8K
# context is too small for Claude Code -- see the README's Limits section.
[qwen-27b-uncensored]
wired-limit-mb = 13824
hf-repo = HauhauCS/Qwen3.6-27B-Uncensored-HauhauCS-Aggressive:IQ3_XS
chat-template-file = templates/qwen3.6.jinja
no-mmap = true
n-gpu-layers = 999
ctx-size = 8192
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
image-max-tokens = 1024
