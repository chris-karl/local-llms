# Single source of truth for every model in this repo.
#
#   ./chat.sh <name>    interactive CLI chat, no server   (llama-cli)
#   ./serve.sh          router server for Claude Code     (llama-server)
#
# Section name = the model id: what you type after ./chat.sh, and what the
# router answers to. Claude Code's /model picker shows it as "claude-<name>".
#
# Keys must be real llama.cpp long-form flag names -- the router refuses to
# start on an unknown key -- and both llama-cli and llama-server accept every
# key below, which is why one file drives both. Note "n-gpu-layers", not
# "ngl": llama-cli only takes -ngl in its short form. Two keys are special,
# both explained in the README: "wired-limit-mb" is ours rather than
# llama.cpp's and is stripped before launch, and "chat-template-file" is a
# real flag whose relative value resolves against this directory.
#
# These presets are sized to fit a GPU-wired budget of ~13 GB. Quant,
# ctx-size and wired-limit-mb are the knobs to turn for a different budget.

# 8.9 GB weights + 0.9 GB vision projector (auto-loaded, so images work)
# ~= 9.8 GB GPU-wired. Hybrid attention (8/32 full-attn layers) makes 64K
# context cost only ~1.1 GB with q8_0 KV; drop to 32768 if images ever OOM.
# wired-limit-mb = 0 asks for no raise at all: this fits inside the cap
# macOS applies by default.
# The only model here with enough context to drive Claude Code.
[qwen-9b]
wired-limit-mb = 0
hf-repo = HauhauCS/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive:Q8_0
chat-template-file = templates/qwen-9b.jinja
n-gpu-layers = 999
ctx-size = 65536
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# IQ3_XS = 11.4 GB of weights that must all be GPU-wired (with mmap,
# llama.cpp maps the whole file as one buffer in Metal, Apple's GPU API,
# even with partial -ngl).
# ~12 GB total incl. KV/state/compute, hence the 13 GB asked for below: on
# macOS the scripts raise the cap to that only if it is not already higher.
# no-mmproj skips the 885 MB vision projector; see qwen-27b-images for the
# variant that keeps it.
[qwen-27b]
wired-limit-mb = 13312
hf-repo = HauhauCS/Qwen3.6-27B-Uncensored-HauhauCS-Aggressive:IQ3_XS
chat-template-file = templates/qwen-27b.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 8192
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Image-enabled 27B: ~11 GB weights + 0.9 GB f16 vision tower + ~1.1 GB
# worst-case image-encode buffers. Needs no-mmap on top of the raised cap --
# with mmap the whole file is Metal-mapped as one buffer and auto-fit can't
# keep the ~0.5 GB of weights in CPU RAM that vision needs room for.
# image-max-tokens caps per-image encode cost; lower to 512 for faster image
# turns at less detail.
[qwen-27b-images]
wired-limit-mb = 13824
hf-repo = HauhauCS/Qwen3.6-27B-Uncensored-HauhauCS-Aggressive:IQ3_XS
chat-template-file = templates/qwen-27b.jinja
no-mmap = true
n-gpu-layers = 999
ctx-size = 8192
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
image-max-tokens = 1024
