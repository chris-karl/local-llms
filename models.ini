# Single source of truth for every model in this repo.
#
#   ./chat.sh <name>    interactive CLI chat, no server   (llama-cli)
#   ./serve.sh          router server for Claude Code     (llama-server)
#
# Section name = the model id: what you type after ./chat.sh, and what the
# router answers to. Claude Code's /model picker shows it as "claude-<name>".
#
# Keys must be real llama.cpp long-form flag names -- the router refuses to
# start on an unknown key -- and both llama-cli and llama-server accept every
# key below, which is why one file drives both. Note "n-gpu-layers", not
# "ngl": llama-cli only takes -ngl in its short form. Two keys are special,
# both explained in the README: "wired-limit-mb" is ours rather than
# llama.cpp's and is stripped before launch, and "chat-template-file" is a
# real flag whose relative value resolves against this directory.
#
# These presets are sized to fit a GPU-wired budget of ~13.5 GB. Quant,
# ctx-size and wired-limit-mb are the knobs to turn for a different budget.

# Qwen3.6-35B-A3B -- the default for Claude Code. A MoE with 3B active
# parameters, so it decodes several times faster than the dense 27B, which
# an agentic loop spends most of its time on; on agentic benchmarks it sits
# just below it (SWE-bench Verified 73.4 vs 77.2). ~11.4 GiB GPU-wired,
# measured: ~10.7 GiB UD-IQ2_M weights + only ~0.5 GiB q8_0 KV at 48K,
# since most layers are linear-attention and carry recurrent state rather
# than a KV cache that grows with context. Needs the cap raised (below).
# parallel = 1 because that recurrent state is per-slot; see the README.
[qwen-35b]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ2_M
chat-template-file = templates/qwen3.6.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Qwen3.6-27B -- dense, every parameter active per token: the strongest
# model here per token (SWE-bench Verified 77.2, Terminal-Bench 2.0 59.3)
# and the slowest (~5x the 35B's latency here), for the Claude Code tasks
# the 35B gets wrong. ~12.0 GiB GPU-wired at 48K, measured: ~10.1 GiB
# weights + ~1.6 GiB q8_0 KV, which being dense grows fast with context, so
# 48K is the ceiling here -- 64K overflows even the raised cap once decode's
# compute buffers are added. Same cap raise and parallel = 1 as the 35B.
[qwen-27b]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3.6-27B-GGUF:UD-IQ2_M
chat-template-file = templates/qwen3.6.jinja
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Qwen3-Coder-30B-A3B -- candidate for Claude Code, staged for testing. The
# coder-specialized sibling of qwen-35b: a 30B MoE, 3B active, tuned for
# agentic coding and tool calls (its own function-call format, native in
# CLINE/Qwen Code), so it decodes in the 35B's speed class and gives a
# coder-vs-general A/B at the same 2-bit tier. ~10.1 GiB of UD-IQ2_M weights,
# but full-attention KV (no DeltaNet), so KV grows with context like the dense
# 27B: 32K fits the wired budget with room, 48K is the Phase-1 stretch to
# confirm. No patched chat-template yet, so it falls back to the GGUF's own --
# fine for ./chat.sh, but Claude Code needs the template derived and patched
# first (see the README's template section). parallel = 1 gives the one
# session the whole ctx-size instead of splitting it across the default 4 slots.
[qwen3-coder]
wired-limit-mb = 13824
hf-repo = unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:UD-IQ2_M
no-mmproj = true
n-gpu-layers = 999
ctx-size = 32768
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# gpt-oss-20b -- candidate for Claude Code, staged for testing. OpenAI's open
# 21B MoE, 3.6B active, with native function calling. The one candidate that
# escapes the 2-bit squeeze: its experts are natively MXFP4 (~4-bit), so Q5_K_M
# is near-native at ~10.9 GiB rather than a 2-bit degrade. Sliding-window
# attention keeps the KV small, so 48K fits easily and 64K+ is likely (confirm
# in Phase 1). Non-Qwen: it speaks the harmony format, so it needs its own
# chat-template derived and its tool_use path re-verified before Claude Code
# (see the README). Drives ./chat.sh today on the GGUF's own template.
[gpt-oss]
wired-limit-mb = 13824
hf-repo = unsloth/gpt-oss-20b-GGUF:Q5_K_M
no-mmproj = true
n-gpu-layers = 999
ctx-size = 49152
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Devstral-Small-2507 -- candidate for Claude Code, staged for testing.
# Mistral's dense 24B, purpose-built for agentic coding tool-use (the default
# model in OpenHands/Cline). Dense means every parameter is active per token,
# so it is the slowest candidate and its KV grows fast with context; the
# payoff is precision -- at 24B it fits ~3-bit (IQ3_XS, ~9.2 GiB) where the
# MoEs above need 2-bit, which is the test: does a smaller, higher-precision
# model beat a 2-bit giant? That heavy dense KV caps it near 24K in this
# budget. Non-Qwen: Mistral's own tool-call format, so it needs its own
# chat-template derived and its tool_use path re-verified before Claude Code
# (see the README). Runs ./chat.sh today on the GGUF's own template.
[devstral]
wired-limit-mb = 13824
hf-repo = bartowski/mistralai_Devstral-Small-2507-GGUF:IQ3_XS
no-mmproj = true
n-gpu-layers = 999
ctx-size = 24576
parallel = 1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0

# Image-enabled uncensored 27B finetune, for ./chat.sh: ~11 GB weights +
# 0.9 GB f16 vision tower + ~1.1 GB worst-case image-encode buffers. Needs
# no-mmap on top of the raised cap -- with mmap the whole file is Metal-
# mapped as one buffer and auto-fit can't keep vision's ~0.5 GB of weights
# in CPU RAM. image-max-tokens caps per-image encode cost; lower to 512 for
# faster, less-detailed image turns. Its 8K context is too small for Claude
# Code -- see the README's Limits section.
[qwen-27b-uncensored]
wired-limit-mb = 13824
hf-repo = HauhauCS/Qwen3.6-27B-Uncensored-HauhauCS-Aggressive:IQ3_XS
chat-template-file = templates/qwen3.6.jinja
no-mmap = true
n-gpu-layers = 999
ctx-size = 8192
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
image-max-tokens = 1024
